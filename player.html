<!DOCTYPE html>
<html>
<head>
<title>Live Player</title>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,shrink-to-fit=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { background: #000; width: 100%; height: 100%; overflow: hidden; font-family: sans-serif; }
#player { width: 100%; height: 100vh; }

#no-url {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: #0d0d0d; color: #fff; gap: 16px;
  z-index: 999;
}
#no-url h2 { font-size: 18px; font-weight: 500; color: #ccc; }
#no-url input {
  width: min(420px, 90vw);
  background: #1a1a1a; border: 1px solid #333;
  color: #fff; border-radius: 6px;
  padding: 10px 14px; font-size: 14px; outline: none;
}
#no-url input:focus { border-color: #e8c84a; }
#no-url button {
  background: #e8c84a; color: #000;
  border: none; border-radius: 6px;
  padding: 10px 24px; font-size: 14px;
  font-weight: 600; cursor: pointer;
}
#no-url button:hover { opacity: 0.85; }
#no-url small { color: #555; font-size: 12px; }

/* fallback video element (hls.js direct) */
#fallback-video {
  display: none;
  position: fixed; inset: 0;
  width: 100%; height: 100%;
  background: #000;
  z-index: 10;
}

#toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: rgba(232,200,74,0.15); border: 1px solid rgba(232,200,74,0.4);
  color: #e8c84a; padding: 8px 18px; border-radius: 20px;
  font-size: 13px; transition: transform 0.3s; z-index: 1000; pointer-events: none;
  white-space: nowrap;
}
#toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="no-url">
  <h2>ป้อน URL ของ Stream</h2>
  <input type="text" id="urlInput" placeholder="https://example.com/live/stream.m3u8" />
  <button onclick="startFromInput()">▶ เปิดดู</button>
  <small>หรือเปิดผ่าน <code>?url=https://...</code></small>
</div>

<div id="player"></div>
<video id="fallback-video" controls playsinline></video>
<div id="toast"></div>

<script>
// ─── utils ────────────────────────────────────────────────────────────────────
function qs(key) { return new URLSearchParams(location.search).get(key); }

var _toastTimer;
function toast(msg, dur) {
  clearTimeout(_toastTimer);
  var t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  _toastTimer = setTimeout(function() { t.classList.remove('show'); }, dur || 2800);
}

function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function() { cb(new Error('Failed to load: ' + src)); };
  document.head.appendChild(s);
}

// ─── safe play (guards AbortError) ───────────────────────────────────────────
function safePlay(videoEl) {
  var p = videoEl.play();
  if (p && typeof p.then === 'function') {
    p.then(null, function(err) {
      // AbortError = play interrupted by pause/src-change — benign, ignore
      if (err && err.name !== 'AbortError') {
        toast('⚠ autoplay ถูกบล็อก — กดหน้าจอเพื่อเล่น');
      }
    });
  }
}

// ─── fallback: hls.js direct (no Clappr) ─────────────────────────────────────
var hlsInstance = null;

function startHlsFallback(src) {
  var vid = document.getElementById('fallback-video');
  vid.style.display = 'block';
  document.getElementById('player').style.display = 'none';
  toast('ใช้ hls.js fallback...');

  if (hlsInstance) { hlsInstance.destroy(); hlsInstance = null; }

  if (typeof Hls !== 'undefined' && Hls.isSupported()) {
    hlsInstance = new Hls({
      liveSyncDurationCount: 3,
      liveMaxLatencyDurationCount: 8,
      enableWorker: true,
      xhrSetup: function(xhr) { xhr.withCredentials = false; },
    });
    hlsInstance.loadSource(src);
    hlsInstance.attachMedia(vid);
    hlsInstance.on(Hls.Events.MANIFEST_PARSED, function() {
      toast('▶ กำลังเล่น (hls.js)');
      safePlay(vid);
    });
    hlsInstance.on(Hls.Events.ERROR, function(_, data) {
      if (data.fatal) {
        if (data.type === Hls.ErrorTypes.NETWORK_ERROR) {
          toast('↺ network error — retry...');
          setTimeout(function() { hlsInstance.startLoad(); }, 2000);
        } else if (data.type === Hls.ErrorTypes.MEDIA_ERROR) {
          toast('↺ media error — recover...');
          hlsInstance.recoverMediaError();
        } else {
          toast('⚠ fatal error: ' + data.details);
        }
      }
    });
  } else if (vid.canPlayType('application/vnd.apple.mpegurl')) {
    // Safari native HLS
    vid.src = src;
    safePlay(vid);
    toast('▶ กำลังเล่น (native HLS)');
  } else {
    toast('⚠ เบราว์เซอร์ไม่รองรับ HLS');
  }
}

// ─── Clappr player ───────────────────────────────────────────────────────────
var clapprInstance = null;
var _retryCount = 0;
var _retryTimer = null;
var _currentSrc = '';

function initClappr(src) {
  _currentSrc = src;
  document.getElementById('no-url').style.display = 'none';

  if (clapprInstance) {
    try { clapprInstance.destroy(); } catch(e) {}
    clapprInstance = null;
    document.getElementById('player').innerHTML = '';
  }

  // LevelSelector: ต้องใช้ version ที่ ship พร้อม register ไม่ใช่ CDN เก่า
  // ตรวจว่ามี plugin หรือไม่
  var plugins = [];
  if (typeof LevelSelector !== 'undefined') plugins.push(LevelSelector);

  clapprInstance = new Clappr.Player({
    source:   src,
    mimeType: 'application/x-mpegURL',
    height:   '100%',
    width:    '100%',
    autoPlay: false,   // เราจะ play เอง หลัง event READY
    mute:     false,
    plugins:  plugins,
    hlsjsConfig: {
      liveSyncDurationCount:       3,
      liveMaxLatencyDurationCount: 8,
      maxBufferLength:             30,
      enableWorker:                true,
      xhrSetup: function(xhr) { xhr.withCredentials = false; },
    },
    parentId: '#player',
  });

  // เล่นหลัง ready — หลีกเลี่ยง play/pause race
  clapprInstance.on(Clappr.Events.PLAYER_READY, function() {
    _retryCount = 0;
    setTimeout(function() {
      if (clapprInstance) clapprInstance.play();
    }, 200);
  });

  clapprInstance.on(Clappr.Events.PLAYER_PLAY, function() {
    toast('▶ กำลังเล่น');
    _retryCount = 0;
  });

  clapprInstance.on(Clappr.Events.PLAYER_ERROR, function(e) {
    console.warn('[player] error', e);
    if (_retryCount < 3) {
      _retryCount++;
      toast('↺ retry ' + _retryCount + '/3...');
      clearTimeout(_retryTimer);
      _retryTimer = setTimeout(function() { initClappr(_currentSrc); }, 2500);
    } else {
      toast('↪ fallback hls.js...');
      startHlsFallback(_currentSrc);
    }
  });

  // tap-to-play สำหรับ mobile autoplay policy
  var el = document.getElementById('player');
  el.addEventListener('click', function handler() {
    if (clapprInstance) clapprInstance.play();
    el.removeEventListener('click', handler);
  });
}

function startFromInput() {
  var url = document.getElementById('urlInput').value.trim();
  if (!url) { toast('กรุณาใส่ URL ก่อน'); return; }
  history.replaceState(null, '', '?url=' + encodeURIComponent(url));
  _retryCount = 0;
  initClappr(url);
}

// ─── boot: โหลด hls.js ก่อน แล้วค่อย clappr ─────────────────────────────────
loadScript('https://cdn.jsdelivr.net/npm/hls.js@1.5.7/dist/hls.min.js', function() {
  // clappr 0.4.x มี level-selector built-in แล้ว (ไม่ต้องโหลดแยก)
  loadScript('https://cdn.jsdelivr.net/npm/@clappr/player@0.4.10/dist/clappr.min.js', function(err) {
    if (err || typeof Clappr === 'undefined') {
      // clappr โหลดไม่ได้ → ใช้ hls.js ตรงเลย
      var src = qs('url');
      if (src) { startHlsFallback(src); }
      return;
    }

    var src = qs('url');
    if (src) { initClappr(src); }
    // ถ้าไม่มี ?url= → แสดง overlay กรอก URL
  });
});
</script>
</body>
</html>
